<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Badminton Manager</title>

  <link rel="stylesheet" href="css/style.css">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>
<body>
  
<div id="loadingScreen" class="loading">
  <div class="loading-content">
    <img src="images/logo.png" class="loading-logo" />
    <div class="dot-loader">
      <span></span>
      <span></span>
      <span></span>
    </div>
  </div>
</div>
<div id="overlay" class="overlay"></div>

  <div class="layout">

    <!-- Sidebar -->
    <div class="sidebar">
      <div class="logo">
  <img src="images/logo.png" class="sidebar-logo" />
  <p>Badminton Manager ทดสอบครั้งที่ 21</p>
</div>

      <ul class="menu">
  <li id="menuMembers" onclick="loadPage('members', this)">รายชื่อ</li>
  <li onclick="loadPage('session', this)">จัดก๊วน</li>
  <li onclick="loadPage('shuttle', this)">ลูกแบด</li>
  <li onclick="loadPage('history', this)">ประวัติ</li>
  <li onclick="loadPage('payment', this)">ชำระเงิน</li>
</ul>
    </div>

<div class="content">

  <button id="menuToggle" class="menu-btn">☰</button>

  <h2 id="username">กำลังโหลด...</h2>

  <!-- ตรงนี้สำคัญ -->
  <div id="pageContent"></div>

  <button class="floating-btn" onclick="showAddForm()">+</button>
</div>

  </div>

  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/liff-init.js"></script>
  <script src="js/page.js"></script> 
  <script src="js/user.js"></script>
  
<div id="memberModal" class="modal">
  <div class="modal-box">

    <h3 id="modalTitle">เพิ่มสมาชิก</h3>

    <label>ชื่อเล่น</label>
    <input id="newNick">

    <label>ชื่อจริง</label>
    <input id="newReal">

    <label>เบอร์โทร</label>
    <input id="newPhone">

    <label>วันเกิด</label>
    <input id="newBirth" type="date">

    <label>ระดับมือ</label>
    <select id="newLevel">
      <option>Beginner</option>
      <option>P</option>
      <option>P+</option>
      <option>S</option>
    </select>

    <div class="modal-actions">
      <button onclick="addMember()" class="btn-primary">บันทึก</button>
      <button onclick="closeModal()">ยกเลิก</button>
    </div>

  </div>
</div>
</body>
</html>
